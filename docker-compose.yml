version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ecom_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Ecom@2026Secure
      MYSQL_DATABASE: ecommerce_ai
      MYSQL_USER: ecom_app
      MYSQL_PASSWORD: EcomApp@2026DB
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations/versions:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: always
    command: redis-server --requirepass Redis@2026Ecom --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

volumes:
  mysql_data:
